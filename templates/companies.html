{% extends "base.html" %}

{% block content %}

<h2>Companies</h2>

<table class="table">

    <tr>
        <th>ID</th>
        <th>Company</th>
        <th>Plan</th>
        <th>Status</th>
    </tr>

    {% for company in companies %}

    <tr>

        <td>{{ company.id }}</td>

        <td>{{ company.company_name }}</td>

        <td>{{ company.plan }}</td>

        <td>{{ company.status }}</td>

    </tr>

    {% endfor %}

</table>

{% endblock %}
