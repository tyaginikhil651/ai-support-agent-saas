<h1>Complaints</h1>

<table border="1">

    <tr>
        <th>ID</th>
        <th>User</th>
        <th>Complaint</th>
        <th>Status</th>
    </tr>

    {% for c in complaints %}
    <tr>
        <td>{{ c.id }}</td>
        <td>{{ c.user_id }}</td>
        <td>{{ c.complaint }}</td>
        <td>{{ c.status }}</td>
    </tr>
    {% endfor %}

</table>
