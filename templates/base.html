<!DOCTYPE html>
<html>

<head>


    <script src="/static/live_alerts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>AI Support Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="/static/style.css">

</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">

        <div class="container-fluid">

            <a class="navbar-brand" href="/">
                AI Support Agent
            </a>

            {% if admin %}

            <div class="d-flex align-items-center gap-3 text-white">

                <div class="text-end">

                    <div class="fw-semibold">
                        {{ admin.username }}
                    </div>

                    <small class="text-light">
                        {{ admin.role | capitalize }}
                    </small>

                </div>

                <a href="/logout" class="btn btn-outline-light btn-sm">
                    Logout
                </a>

            </div>

            {% endif %}

        </div>

    </nav>

    <div class="d-flex">

        <div class="sidebar">
            <a href="/">Dashboard</a>
            <a href="/customers">Customers</a>
            <a href="/tickets">Tickets</a>
            <a href="/appointments">Appointments</a>
            <a href="/companies">Companies</a>
            <a href="/escalated" class="btn btn-warning m-2">Escalated Tickets</a>
            <a href="/analytics" class="btn btn-primary m-2">Analytics</a>

        </div>

        <div class="content">

            {% block content %}
            {% endblock %}

        </div>

    </div>

</body>

</html>
