{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center mt-5">

    <div class="col-md-5">

        <div class="card shadow-sm">

            <div class="card-body p-4">

                <h3 class="mb-2">
                    AI Support Dashboard
                </h3>

                <p class="text-muted mb-4">
                    Sign in to manage your company support system.
                </p>

                {% if error %}
                <div class="alert alert-danger">
                    {{ error }}
                </div>
                {% endif %}

                <form method="post" action="/login">

                    <div class="mb-3">

                        <label class="form-label">
                            Company Slug
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            name="tenant_slug"
                            placeholder="abc-internet"
                            required
                        >

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Username
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            name="username"
                            placeholder="nikhil"
                            required
                        >

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Password
                        </label>

                        <input
                            type="password"
                            class="form-control"
                            name="password"
                            required
                        >

                    </div>

                    <button
                        type="submit"
                        class="btn btn-primary w-100"
                    >
                        Login
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
